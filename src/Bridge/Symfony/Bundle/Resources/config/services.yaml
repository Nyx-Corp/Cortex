services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $dbalConnection: '@doctrine.dbal.default_connection'

    _instanceof:
        Cortex\Bridge\Symfony\Api\VersionTransformerInterface:
            tags: ['cortex.api.version_transformer']
        Mcp\Capability\Registry\Loader\LoaderInterface:
            tags: ['mcp.loader']
        Cortex\Component\Mapper\ModelRepresentation:
            tags: ['cortex.model_representation']

    # ControllerInterface tagging is handled by ControllerTaggingPass

    Cortex\Component\Model\Query\Factory\QueryFactory:
        class: Cortex\Bridge\Symfony\Model\Query\RequestQueryFactory

    Cortex\Bridge\Symfony\Controller\ModelFactoryValueResolver:
        tags:
            - { name: controller.argument_value_resolver, priority: 50 }

    Cortex\Bridge\Symfony\Translation\ModuleTranslator:
        decorates: 'translator'
        decoration_priority: -10
        decoration_on_invalid: null
        arguments:
            $translator: '@Cortex\Bridge\Symfony\Translation\ModuleTranslator.inner'
        autowire: true
        autoconfigure: false
        public: false

    Cortex\Bridge\Symfony\Routing\ControllerRouteLoader:
        tags:
            - { name: routing.loader }

    Cortex\Bridge\Symfony\Api\ApiRouteLoader:
        tags:
            - { name: routing.loader }

    Cortex\Bridge\Symfony\Api\ApiController:
        tags: ['controller.service_arguments']

    Cortex\Bridge\Symfony\Api\VersionTransformerCollection:
        arguments:
            $transformers: !tagged_iterator cortex.api.version_transformer

    Cortex\Bridge\Symfony\Api\ApiRateLimitWarningSubscriber:
        tags:
            - { name: cortex.api.rate_limit_guard }

    Cortex\Bridge\Symfony\Api\OpenApiGenerator:
        arguments:
            $actionMetadata: []

    Cortex\Bridge\Symfony\Api\OpenApiController:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $debug: '%kernel.debug%'
        tags: ['controller.service_arguments']

    Cortex\Bridge\Symfony\Console\OpenApiDumpCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Cortex\Bridge\Symfony\Form\CommandFormType:
        arguments:
            $fieldsConfig: []

    Cortex\Bridge\:
        resource: '../../../../../Bridge/'
        exclude:
            - '../../../../../Bridge/Symfony/Bundle'
            - '../../../../../Bridge/Symfony/Translation/'
            - '../../../../../Bridge/Symfony/Routing/'
            - '../../../../../Bridge/Symfony/Console/'
            - '../../../../../Bridge/Symfony/Api/'

    Cortex\Component\:
        resource: '../../../../../Component/'
        exclude:
            - '../../../../../Component/Collection/'
            - '../../../../../Component/Json/'
            - '../../../../../Component/Mapper/Relation.php'
            - '../../../../../Component/Model/ModelCollection.php'
